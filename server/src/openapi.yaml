openapi: 3.0.3
info:
  title: Zync API
  description: Fitness activity tracking API
  version: 1.0.0

paths:
  /api/activities:
    get:
      summary: List activities
      operationId: listActivities
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 30
        - name: before
          in: query
          description: Unix timestamp - only activities before this time
          schema:
            type: integer
        - name: after
          in: query
          description: Unix timestamp - only activities after this time
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActivitiesResponse'

  /api/activities/{id}:
    get:
      summary: Get activity by ID
      operationId: getActivity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActivityResponse'

  /api/activities/stats:
    get:
      summary: Get aggregated activity stats
      operationId: getActivityStats
      parameters:
        - name: period
          in: query
          description: Time period for stats
          schema:
            type: string
            enum: [week, last_week, month, year, last_year, all]
            default: week
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActivityStatsResponse'

  /api/activities/stats/daily:
    get:
      summary: Get daily activity stats for charts
      operationId: getDailyStats
      parameters:
        - name: period
          in: query
          description: Time period for stats
          schema:
            type: string
            enum: [week, last_week, month, year, last_year, all]
            default: week
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDailyStatsResponse'

  /api/activities/{id}/streams:
    get:
      summary: Get activity stream data
      operationId: getActivityStreams
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActivityStreamsResponse'

  /api/auth/me:
    get:
      summary: Get current authenticated user
      operationId: getCurrentUser
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMeResponse'

  /api/auth/strava/url:
    post:
      summary: Get Strava OAuth URL
      operationId: getStravaAuthUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAuthUrlRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAuthUrlResponse'

  /api/auth/logout:
    post:
      summary: Logout current user
      operationId: logout
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'

components:
  schemas:
    # Core domain types
    ActivityType:
      type: string
      enum:
        - Run
        - TrailRun
        - VirtualRun
        - Ride
        - MountainBikeRide
        - GravelRide
        - EBikeRide
        - VirtualRide
        - Swim
        - Walk
        - Hike
        - AlpineSki
        - BackcountrySki
        - NordicSki
        - Workout
        - WeightTraining
        - Yoga
        - Snowboard
        - Snowshoe
        - IceSkate
        - RollerSki
        - Crossfit
        - Kayaking
        - Other

    Activity:
      type: object
      required:
        - id
        - name
        - type
        - distanceMeters
        - movingTimeSeconds
        - elapsedTimeSeconds
        - elevationGainMeters
        - startDate
        - startDateLocal
        - averageSpeed
        - maxSpeed
      properties:
        id:
          type: integer
          description: Unique activity identifier
        name:
          type: string
          description: Activity name
        type:
          $ref: '#/components/schemas/ActivityType'
        distanceMeters:
          type: number
          description: Distance in meters
        movingTimeSeconds:
          type: integer
          description: Moving time in seconds
        elapsedTimeSeconds:
          type: integer
          description: Total elapsed time in seconds
        elevationGainMeters:
          type: number
          description: Elevation gain in meters
        startDate:
          type: string
          format: date-time
          description: Activity start time (UTC)
        startDateLocal:
          type: string
          format: date-time
          description: Activity start time (local timezone)
        averageSpeed:
          type: number
          description: Average speed in meters per second
        maxSpeed:
          type: number
          description: Maximum speed in meters per second
        averageHeartRate:
          type: number
          nullable: true
          description: Average heart rate in BPM
        maxHeartRate:
          type: number
          nullable: true
          description: Maximum heart rate in BPM
        kudosCount:
          type: integer
          description: Number of kudos
        commentCount:
          type: integer
          description: Number of comments

    DetailedActivity:
      allOf:
        - $ref: '#/components/schemas/Activity'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            calories:
              type: number
              nullable: true
            averageCadence:
              type: number
              nullable: true
            averageWatts:
              type: number
              nullable: true
            maxWatts:
              type: integer
              nullable: true
            weightedAverageWatts:
              type: integer
              nullable: true
            sufferScore:
              type: integer
              nullable: true
            startLatLng:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
              nullable: true
              description: Start coordinates as [latitude, longitude]
            endLatLng:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
              nullable: true
              description: End coordinates as [latitude, longitude]
            map:
              type: object
              nullable: true
              properties:
                polyline:
                  type: string
                  nullable: true
                summaryPolyline:
                  type: string
                  nullable: true
            laps:
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/Lap'
            splitsMetric:
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/Split'
            bestEfforts:
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/BestEffort'
            segmentEfforts:
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/SegmentEffort'
            photos:
              $ref: '#/components/schemas/PhotosSummary'
            elevHigh:
              type: number
              nullable: true
              description: Highest elevation point in meters
            elevLow:
              type: number
              nullable: true
              description: Lowest elevation point in meters
            kilojoules:
              type: number
              nullable: true
              description: Total energy output in kilojoules
            deviceName:
              type: string
              nullable: true
              description: Name of the recording device

    Lap:
      type: object
      required:
        - lapIndex
        - name
        - distanceMeters
        - elapsedTimeSeconds
        - movingTimeSeconds
        - startDate
      properties:
        lapIndex:
          type: integer
        name:
          type: string
        distanceMeters:
          type: number
        elapsedTimeSeconds:
          type: integer
        movingTimeSeconds:
          type: integer
        startDate:
          type: string
          format: date-time
        totalElevationGain:
          type: number
          nullable: true
        averageSpeed:
          type: number
          nullable: true
        maxSpeed:
          type: number
          nullable: true
        averageHeartRate:
          type: number
          nullable: true
        maxHeartRate:
          type: number
          nullable: true

    Split:
      type: object
      required:
        - split
        - distanceMeters
        - elapsedTimeSeconds
        - movingTimeSeconds
      properties:
        split:
          type: integer
        distanceMeters:
          type: number
        elapsedTimeSeconds:
          type: integer
        movingTimeSeconds:
          type: integer
        elevationDifference:
          type: number
          nullable: true
        averageSpeed:
          type: number
          nullable: true
        paceZone:
          type: integer
          nullable: true

    BestEffort:
      type: object
      required:
        - name
        - distanceMeters
        - elapsedTimeSeconds
        - movingTimeSeconds
      properties:
        name:
          type: string
          description: "Standard distance name (e.g., 400m, 1K, 1 mile, 5K)"
        distanceMeters:
          type: number
        elapsedTimeSeconds:
          type: integer
        movingTimeSeconds:
          type: integer
        prRank:
          type: integer
          nullable: true
          description: "Personal record rank (1 = current PR, null = not a PR)"

    SegmentEffort:
      type: object
      required:
        - name
        - distanceMeters
        - elapsedTimeSeconds
        - movingTimeSeconds
      properties:
        name:
          type: string
          description: Strava segment name
        distanceMeters:
          type: number
        elapsedTimeSeconds:
          type: integer
        movingTimeSeconds:
          type: integer
        averageHeartRate:
          type: number
          nullable: true
        prRank:
          type: integer
          nullable: true
          description: "Personal record rank on this segment"

    PhotosSummary:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          description: Total number of photos on this activity
        primary:
          type: object
          nullable: true
          properties:
            uniqueId:
              type: string
            url100:
              type: string
              description: 100px thumbnail URL
            url600:
              type: string
              description: 600px image URL
            mediaType:
              type: integer
              description: "1 = photo, 2 = video"

    User:
      type: object
      required:
        - id
        - firstName
        - lastName
        - profileUrl
      properties:
        id:
          type: integer
          description: Unique user identifier
        firstName:
          type: string
        lastName:
          type: string
        profileUrl:
          type: string
          description: URL to profile image
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        country:
          type: string
          nullable: true

    # API Responses
    GetActivitiesResponse:
      type: object
      required:
        - activities
        - page
        - perPage
        - hasMore
      properties:
        activities:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
        page:
          type: integer
        perPage:
          type: integer
        hasMore:
          type: boolean
        totalCount:
          type: integer
          description: Total number of activities (only available when no date filters applied)
        cached:
          type: boolean

    GetActivityResponse:
      type: object
      required:
        - activity
      properties:
        activity:
          $ref: '#/components/schemas/DetailedActivity'
        cached:
          type: boolean

    GetMeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'
          nullable: true
        tokenExpiresAt:
          type: integer
          description: Unix timestamp when token expires

    GetAuthUrlRequest:
      type: object
      required:
        - redirectUri
      properties:
        redirectUri:
          type: string
          format: uri

    GetAuthUrlResponse:
      type: object
      required:
        - url
        - state
      properties:
        url:
          type: string
          format: uri
        state:
          type: string

    LogoutResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    StatsPeriod:
      type: string
      enum:
        - week
        - last_week
        - month
        - year
        - last_year
        - all

    GetActivityStatsResponse:
      type: object
      required:
        - period
        - totalMovingTimeSeconds
        - cyclingDistanceMeters
        - runningDistanceMeters
        - totalCalories
        - activityCount
        - currentStreak
        - longestStreak
      properties:
        period:
          $ref: '#/components/schemas/StatsPeriod'
        totalMovingTimeSeconds:
          type: integer
          description: Total moving time in seconds
        cyclingDistanceMeters:
          type: number
          description: Total cycling distance in meters
        runningDistanceMeters:
          type: number
          description: Total running distance in meters
        totalCalories:
          type: number
          description: Total calories burned
        activityCount:
          type: integer
          description: Number of activities in the period
        currentStreak:
          type: integer
          description: Current consecutive days with activities
        longestStreak:
          type: integer
          description: All-time longest consecutive days with activities
        longestStreakStart:
          type: string
          nullable: true
          description: Start date of the longest streak (YYYY-MM-DD)
        longestStreakEnd:
          type: string
          nullable: true
          description: End date of the longest streak (YYYY-MM-DD)

    DailyStatsItem:
      type: object
      required:
        - date
        - hours
        - distanceKm
        - calories
        - activityCount
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        hours:
          type: number
          description: Total activity hours for the day
        distanceKm:
          type: number
          description: Total distance in kilometers for the day
        calories:
          type: number
          description: Total calories burned for the day
        activityCount:
          type: integer
          description: Number of activities for the day

    GetDailyStatsResponse:
      type: object
      required:
        - period
        - data
      properties:
        period:
          $ref: '#/components/schemas/StatsPeriod'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DailyStatsItem'

    GetActivityStreamsResponse:
      type: object
      required:
        - time
      properties:
        time:
          type: array
          items:
            type: integer
          description: Time in seconds since activity start
        heartrate:
          type: array
          items:
            type: number
          description: Heart rate in BPM
          nullable: true
        velocity:
          type: array
          items:
            type: number
          description: Velocity in meters per second
          nullable: true
        altitude:
          type: array
          items:
            type: number
          description: Altitude in meters
          nullable: true
        power:
          type: array
          items:
            type: number
          description: Power output in watts
          nullable: true
